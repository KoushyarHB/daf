# Generate static HTML from committed vocab.manifest.json. No daf_vocab “build” CLI is run here — only write_vocab_preview.
# Repo → Settings → Pages → Source: GitHub Actions.

name: Deploy vocab preview to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate_site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-vocab.txt
      - name: Generate static site
        run: >
          python -c "from pathlib import Path; from daf_vocab.docx_cards import MANIFEST_PATH; from daf_vocab.html_preview import write_vocab_preview; write_vocab_preview(MANIFEST_PATH, MANIFEST_PATH.parent / 'vocab-preview' / 'index.html')"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: vocab-preview

  deploy:
    needs: generate_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
